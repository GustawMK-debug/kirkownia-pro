<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kirkownia // Aesthetic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        :root { --bg: #fdfdfd; --sidebar: #f4f7f5; --sage: #a3b18a; --forest: #3a5a40; --text-dark: #344e41; --text-light: #8e9e94; --white: #ffffff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-dark); display: flex; height: 100vh; overflow: hidden; }
        #auth-overlay { position: fixed; inset: 0; z-index: 1000; background: var(--white); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s; }
        .auth-card { text-align: center; max-width: 320px; width: 100%; }
        input { width: 100%; padding: 15px; border: none; border-bottom: 1px solid #e0e0e0; font-family: inherit; font-size: 1rem; margin-bottom: 30px; outline: none; background: transparent; text-align: center; }
        .btn-minimal { background: var(--forest); color: white; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-size: 0.9rem; transition: 0.4s; }
        #sidebar { width: 280px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #eeeeee; padding-top: 40px; }
        .sidebar-title { padding: 0 30px; font-weight: 600; font-size: 0.8rem; letter-spacing: 2px; color: var(--text-light); margin-bottom: 20px; }
        .nav-item { padding: 12px 30px; cursor: pointer; color: var(--text-light); font-size: 0.95rem; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { color: var(--forest); font-weight: 600; border-right: 3px solid var(--sage); background: rgba(163, 177, 138, 0.05); }
        .vc-user-list { padding-left: 55px; margin-bottom: 10px; font-size: 0.85rem; }
        .vc-user { padding: 4px 0; color: var(--text-light); transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .vc-user.speaking { color: var(--forest); font-weight: 600; }
        .dot { width: 6px; height: 6px; background: var(--sage); border-radius: 50%; opacity: 0; }
        .speaking .dot { opacity: 1; }
        #main-view { flex: 1; display: flex; flex-direction: column; }
        #chat-header { padding: 30px 40px; border-bottom: 1px solid #f0f0f0; font-weight: 600; color: var(--forest); }
        #messages-container { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .msg-block { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg-meta { font-size: 0.75rem; color: var(--text-light); margin-bottom: 4px; }
        #input-wrapper { padding: 30px 40px; }
        #chat-input { width: 100%; padding: 18px 25px; border-radius: 15px; border: 1px solid #f0f0f0; outline: none; transition: 0.3s; }
        .user-panel { margin-top: auto; padding: 25px; background: #fff; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .mute-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #eee; background: transparent; cursor: pointer; }
        .mute-btn.active { background: #fee; color: #f66; }
    </style>
</head>
<body>
<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="font-weight:300; color:#3a5a40">KIRKOWNIA</h2>
        <input type="text" id="username-in" placeholder="Podaj imię..." maxlength="15">
        <button class="btn-minimal" onclick="startSession()">DOŁĄCZ</button>
    </div>
</div>
<div id="sidebar">
    <div class="sidebar-title">KANAŁY TEKSTOWE</div>
    <div id="text-nav"></div>
    <div class="sidebar-title" style="margin-top:30px">GŁOSOWE</div>
    <div id="voice-nav">
        <div class="nav-item" onclick="joinVoice('Salon')">Salon</div>
        <div id="users-Salon" class="vc-user-list"></div>
        <div class="nav-item" onclick="joinVoice('Czytelnia')">Czytelnia</div>
        <div id="users-Czytelnia" class="vc-user-list"></div>
    </div>
    <div class="user-panel" id="user-ctrl" style="display:none">
        <span id="my-name" style="font-size: 0.85rem; font-weight: 600"></span>
        <button class="mute-btn" id="m-btn" onclick="toggleMute()">🎤</button>
    </div>
</div>
<div id="main-view">
    <div id="chat-header"># <span id="ch-name">ogolny</span></div>
    <div id="messages-container"></div>
    <div id="input-wrapper"><input type="text" id="chat-input" placeholder="Napisz..." onkeypress="if(event.key==='Enter') sendMsg()"></div>
</div>
<script>
    let socket, myUser, myChannel = 'ogolny', myVC = null, localStream, isMuted = false, audioCtx, analyser, dataArray;
    function startSession() {
        const name = document.getElementById('username-in').value;
        if(!name) return;
        myUser = name;
        document.getElementById('my-name').innerText = name;
        const prot = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        socket = new WebSocket(`${prot}//${window.location.host}/chat`);
        socket.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if(d.type === 'LOGIN_OK') {
                document.getElementById('auth-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('auth-overlay').style.display = 'none', 800);
                document.getElementById('user-ctrl').style.display = 'flex';
                buildNav(d.channels);
                switchChannel('ogolny');
            } else if(d.type === 'CHAT' && d.channel === myChannel) {
                appendMsg(d);
            } else if(d.type === 'HISTORY') {
                document.getElementById('messages-container').innerHTML = '';
                d.messages.forEach(appendMsg);
            } else if(d.type === 'VC_UPDATE') {
                renderVC(d.data);
            } else if(d.type === 'VC_STATE') {
                updateVisualSpeak(d);
            }
        };
        socket.onopen = () => socket.send(JSON.stringify({type:'LOGIN', username:myUser}));
    }
    function buildNav(chs) {
        const nav = document.getElementById('text-nav'); nav.innerHTML = '';
        chs.forEach(c => {
            const el = document.createElement('div');
            el.className = `nav-item ${c === myChannel ? 'active' : ''}`;
            el.innerText = c;
            el.onclick = () => switchChannel(c);
            nav.appendChild(el);
        });
    }
    function switchChannel(c) {
        myChannel = c;
        document.getElementById('ch-name').innerText = c;
        document.querySelectorAll('#text-nav .nav-item').forEach(el => el.classList.toggle('active', el.innerText === c));
        socket.send(JSON.stringify({type:'JOIN_CHANNEL', channel:c}));
    }
    function appendMsg(m) {
        const cont = document.getElementById('messages-container');
        const div = document.createElement('div'); div.className = 'msg-block';
        const time = new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        div.innerHTML = `<div class="msg-meta"><strong>${m.sender}</strong> <span>${time}</span></div><div class="msg-text">${m.content}</div>`;
        cont.appendChild(div); cont.scrollTop = cont.scrollHeight;
    }
    function sendMsg() {
        const i = document.getElementById('chat-input');
        if(i.value) {
            socket.send(JSON.stringify({type:'CHAT', content:i.value, channel:myChannel}));
            i.value = '';
        }
    }
    async function joinVoice(name) {
        if(myVC === name) return;
        myVC = name;
        if(!localStream) {
            localStream = await navigator.mediaDevices.getUserMedia({audio:true});
            startVoiceDetection();
        }
        socket.send(JSON.stringify({type:'VC_JOIN', vcName:name}));
    }
    function renderVC(data) {
        document.querySelectorAll('.vc-user-list').forEach(el => el.innerHTML = '');
        for(let vc in data) {
            const cont = document.getElementById('users-' + vc);
            if(cont) {
                for(let sid in data[vc]) {
                    const div = document.createElement('div');
                    div.className = 'vc-user';
                    div.dataset.name = data[vc][sid];
                    div.innerHTML = `<div class="dot"></div> ${data[vc][sid]}`;
                    cont.appendChild(div);
                }
            }
        }
    }
    function toggleMute() {
        isMuted = !isMuted;
        localStream.getAudioTracks()[0].enabled = !isMuted;
        document.getElementById('m-btn').classList.toggle('active', isMuted);
    }
    function startVoiceDetection() {
        audioCtx = new AudioContext();
        const source = audioCtx.createMediaStreamSource(localStream);
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
        source.connect(analyser); dataArray = new Uint8Array(analyser.frequencyBinCount);
        loop();
    }
    function loop() {
        analyser.getByteFrequencyData(dataArray);
        let vol = dataArray.reduce((a,b) => a+b) / dataArray.length;
        socket.send(JSON.stringify({type:'VC_STATE', username:myUser, speaking: (vol > 15 && !isMuted)}));
        setTimeout(loop, 150);
    }
    function updateVisualSpeak(d) {
        document.querySelectorAll('.vc-user').forEach(el => {
            if(el.dataset.name === d.username) el.classList.toggle('speaking', d.speaking);
        });
    }
</script>
</body>
</html>
