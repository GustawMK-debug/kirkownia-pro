<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>KIRKOWNIA PRO | NEBULA</title>
    <style>
        :root { --neon-pink: #ff007f; --neon-cyan: #00f3ff; --deep-space: #0a0a12; --glass: rgba(255, 255, 255, 0.03); }

        body { font-family: 'Orbitron', sans-serif; background: var(--deep-space); color: #fff; margin: 0; height: 100vh; overflow: hidden; display: flex; }

        /* Animowane tło kosmosu */
        body::before { content: ""; position: fixed; width: 200%; height: 200%; background: radial-gradient(circle, #1b2735 0%, #090a0f 100%); z-index: -1; animation: moveBg 20s linear infinite; }
        @keyframes moveBg { from { transform: translate(-25%, -25%) rotate(0deg); } to { transform: translate(-25%, -25%) rotate(360deg); } }

        #auth-container { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); transition: 1s; }

        .auth-box { background: rgba(255,255,255,0.05); padding: 50px; border-radius: 30px; width: 420px; text-align: center; border: 1px solid var(--neon-cyan); box-shadow: 0 0 30px var(--neon-cyan); position: relative; overflow: hidden; }
        .auth-box::after { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(0,243,255,0.1), transparent); animation: sweep 4s infinite; }
        @keyframes sweep { 0% { transform: translate(-100%, -100%); } 100% { transform: translate(100%, 100%); } }

        h1 { font-size: 2.5rem; letter-spacing: 5px; margin-bottom: 30px; text-shadow: 0 0 10px var(--neon-pink); }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #333; background: #000; color: var(--neon-cyan); font-family: inherit; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: none; border: 2px solid var(--neon-pink); color: white; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; box-shadow: 0 0 10px var(--neon-pink); }
        button:hover { background: var(--neon-pink); box-shadow: 0 0 25px var(--neon-pink); transform: scale(1.05); }

        #sidebar { width: 300px; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); border-right: 1px solid #333; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px; text-align: center; font-size: 1.5rem; font-weight: bold; border-bottom: 1px solid #333; color: var(--neon-cyan); text-shadow: 0 0 5px var(--neon-cyan); }
        .channel { padding: 15px 25px; margin: 10px; cursor: pointer; border-radius: 15px; transition: 0.3s; border: 1px solid transparent; }
        .channel:hover { border-color: var(--neon-cyan); background: rgba(0,243,255,0.05); }
        .channel.active { background: linear-gradient(90deg, var(--neon-cyan), transparent); color: black; font-weight: bold; }

        #chat-area { flex: 1; display: flex; flex-direction: column; background: rgba(255,255,255,0.01); }
        #messages { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .message { background: var(--glass); padding: 20px; border-radius: 20px; border-left: 4px solid var(--neon-pink); animation: pop 0.4s ease-out; }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .msg-user { color: var(--neon-cyan); font-weight: bold; margin-right: 10px; }

        #input-area { padding: 30px; background: rgba(0,0,0,0.3); }
        #msg-input { width: 100%; padding: 20px; border-radius: 20px; border: 1px solid #444; background: #000; color: white; font-size: 1rem; box-shadow: inset 0 0 10px rgba(0,0,0,1); }

        .vc-badge { background: #00ff00; color: black; font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; margin-left: 10px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="auth-container">
    <div class="auth-box" id="login-box">
        <h1>KIRKOWNIA</h1>
        <input type="text" id="login-username" placeholder="IDENTYFIKATOR">
        <input type="password" id="login-password" placeholder="HASŁO">
        <button onclick="login()">AUTORYZUJ</button>
        <p style="margin-top:20px; font-size:0.8rem">BRAK DOSTĘPU? <span style="color:var(--neon-cyan); cursor:pointer" onclick="toggleAuth()">UTWÓRZ KONTO</span></p>
    </div>
    <div class="auth-box" id="register-box" style="display:none">
        <h1>REJESTRACJA</h1>
        <input type="email" id="reg-email" placeholder="E-MAIL">
        <input type="text" id="reg-username" placeholder="NOWY IDENTYFIKATOR">
        <input type="password" id="reg-password" placeholder="HASŁO">
        <button onclick="register()">DOŁĄCZ DO SIECI</button>
        <p style="margin-top:20px; font-size:0.8rem">MASZ KLUCZ? <span style="color:var(--neon-cyan); cursor:pointer" onclick="toggleAuth()">ZALOGUJ</span></p>
    </div>
    <div class="auth-box" id="verify-box" style="display:none">
        <h1>WERYFIKACJA</h1>
        <p>WPISZ KOD PRZESŁANY PRZEZ SATELITĘ</p>
        <input type="text" id="verify-code" placeholder="6-CYFROWY KOD">
        <button onclick="verify()">POTWIERDŹ</button>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-header">STACJA KIRKOWNIA <span style="font-size:1rem; cursor:pointer" onclick="createChannel()">[+]</span></div>
    <div id="channels-list"></div>
    <div style="padding:20px">
        <button id="vc-btn" onclick="toggleVC()" style="border-color: #00ff00; box-shadow: 0 0 10px #00ff00;">POŁĄCZ GŁOSOWO</button>
    </div>
</div>

<div id="chat-area">
    <div id="messages"></div>
    <div id="input-area"><input type="text" id="msg-input" placeholder="NADADAJ WIADOMOŚĆ..." onkeypress="if(event.key==='Enter') sendMessage()"></div>
</div>

<script>
    let socket, currentUser, currentChannel = 'ogolny', userToVerify, pc, localStream;
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    function connect() {
        const prot = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        socket = new WebSocket(`${prot}//${window.location.host}/chat`);
        socket.onmessage = async (e) => {
            const d = JSON.parse(e.data);
            if (d.type === 'LOGIN_OK') {
                currentUser = d.username;
                document.getElementById('auth-container').style.transform = 'translateY(-100%)';
                updateChannels(d.channels);
                switchChannel('ogolny');
            } else if (d.type === 'NEED_VERIFY') {
                userToVerify = d.username;
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('register-box').style.display = 'none';
                document.getElementById('verify-box').style.display = 'block';
            } else if (d.type === 'REGISTER_OK') { alert("Dostęp przyznany! Zaloguj się."); location.reload(); }
            else if (d.type === 'CHAT' && d.channel === currentChannel) displayMsg(d);
            else if (d.type === 'HISTORY') { document.getElementById('messages').innerHTML = ''; d.messages.forEach(displayMsg); }
            else if (d.type === 'CHANNELS_UPDATE') updateChannels(d.channels);
            else if (d.type === 'SIGNAL' && d.sender !== currentUser) handleSignal(d);
            else if (d.type === 'ERROR') alert(d.message);
        };
    }

    function toggleAuth() {
        const l = document.getElementById('login-box'), r = document.getElementById('register-box');
        l.style.display = l.style.display === 'none' ? 'block' : 'none';
        r.style.display = r.style.display === 'none' ? 'block' : 'none';
    }

    function login() { socket.send(JSON.stringify({type:'LOGIN', username:document.getElementById('login-username').value, password:document.getElementById('login-password').value})); }
    function register() { socket.send(JSON.stringify({type:'REGISTER', email:document.getElementById('reg-email').value, username:document.getElementById('reg-username').value, password:document.getElementById('reg-password').value})); }
    function verify() { socket.send(JSON.stringify({type:'VERIFY', username:userToVerify, code:document.getElementById('verify-code').value})); }

    function updateChannels(chs) {
        const l = document.getElementById('channels-list'); l.innerHTML = '';
        chs.sort().forEach(ch => {
            const div = document.createElement('div');
            div.className = `channel ${ch === currentChannel ? 'active' : ''}`;
            div.innerHTML = `# ${ch.toUpperCase()}`;
            div.onclick = () => switchChannel(ch);
            l.appendChild(div);
        });
    }

    function switchChannel(ch) {
        currentChannel = ch;
        socket.send(JSON.stringify({type:'JOIN_CHANNEL', channel:ch}));
        document.querySelectorAll('.channel').forEach(el => el.classList.toggle('active', el.innerText.includes(ch.toUpperCase())));
    }

    function sendMessage() {
        const i = document.getElementById('msg-input');
        if (i.value.trim() && currentUser) {
            socket.send(JSON.stringify({type:'CHAT', content:i.value, channel:currentChannel}));
            i.value = '';
        }
    }

    function displayMsg(m) {
        const c = document.getElementById('messages'), div = document.createElement('div');
        div.className = 'message';
        const t = new Date(m.timestamp).toLocaleTimeString('pl-PL', {hour:'2-digit', minute:'2-digit'});
        div.innerHTML = `<div><span class="msg-user">${m.sender}</span> <span style="font-size:0.6rem; color:#555">${t}</span></div><div style="margin-top:10px">${m.content}</div>`;
        c.appendChild(div); c.scrollTop = c.scrollHeight;
    }

    async function toggleVC() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('vc-btn').innerHTML = "POŁĄCZONO <span class='vc-badge'>LIVE</span>";
            initWebRTC();
        } catch (err) { alert("Błąd systemowy mikrofonu!"); }
    }

    function initWebRTC() {
        pc = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        pc.onicecandidate = e => e.candidate && socket.send(JSON.stringify({type:'SIGNAL', sender:currentUser, candidate:e.candidate}));
        pc.ontrack = e => { const a = new Audio(); a.srcObject = e.streams[0]; a.play(); };
        pc.createOffer().then(o => { pc.setLocalDescription(o); socket.send(JSON.stringify({type:'SIGNAL', sender:currentUser, offer:o})); });
    }

    async function handleSignal(d) {
        if (!pc) initWebRTC();
        if (d.offer) { await pc.setRemoteDescription(new RTCSessionDescription(d.offer)); const a = await pc.createAnswer(); await pc.setLocalDescription(a); socket.send(JSON.stringify({type:'SIGNAL', sender:currentUser, answer:a})); }
        else if (d.answer) { await pc.setRemoteDescription(new RTCSessionDescription(d.answer)); }
        else if (d.candidate) { await pc.addIceCandidate(new RTCIceCandidate(d.candidate)); }
    }

    function createChannel() { const n = prompt("NAZWA NOWEJ STREFY:"); if (n) socket.send(JSON.stringify({type:'CREATE_CHANNEL', name:n})); }
    connect();
</script>
</body>
</html>
