<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kirkownia // Dark</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        :root { --bg-main: #0e0e0e; --bg-panel: #161616; --bg-hover: #222222; --text-main: #e0e0e0; --text-muted: #888888; --accent: #ffffff; --border: #2a2a2a; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        #auth-overlay { position: fixed; inset: 0; z-index: 1000; background: var(--bg-main); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease; }
        .auth-card { width: 340px; padding: 40px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 16px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-card h2 { font-weight: 400; letter-spacing: 3px; margin-bottom: 30px; color: var(--accent); }
        input[type="text"] { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 1rem; margin-bottom: 25px; outline: none; background: #000; color: #fff; box-sizing: border-box; transition: 0.3s; text-align: center; }
        input[type="text"]:focus { border-color: #555; }
        .btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; letter-spacing: 1px; }
        .btn:hover:not(:disabled) { background: #ccc; }
        .btn:disabled { background: #555; cursor: not-allowed; }

        #sidebar { width: 280px; background: var(--bg-panel); display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .sidebar-title { padding: 30px 25px 10px; font-weight: 600; font-size: 0.75rem; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; }
        .nav-item { padding: 10px 25px; cursor: pointer; color: var(--text-muted); font-size: 0.95rem; transition: 0.2s; display: flex; align-items: center; margin: 2px 10px; border-radius: 6px; }
        .nav-item:hover { color: var(--text-main); background: var(--bg-hover); }
        .nav-item.active { color: var(--accent); background: var(--bg-hover); font-weight: 500; }

        .vc-user-list { padding-left: 45px; margin-bottom: 10px; font-size: 0.85rem; }
        .vc-user { padding: 5px 0; color: var(--text-muted); transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .vc-user.speaking { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.3); }
        .dot { width: 6px; height: 6px; background: #fff; border-radius: 50%; opacity: 0; transition: 0.2s; }
        .speaking .dot { opacity: 1; transform: scale(1.2); }

        .user-panel { margin-top: auto; padding: 20px; background: var(--bg-panel); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .ctrl-btns { display: flex; gap: 8px; }
        .icon-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .icon-btn:hover { background: var(--bg-hover); }
        .icon-btn.active { background: #3a1c1c; border-color: #ff4444; color: #ff4444; }
        .leave-btn:hover { background: #3a1c1c; border-color: #ff4444; }

        #main-view { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }
        #chat-header { padding: 25px 30px; border-bottom: 1px solid var(--border); font-weight: 500; font-size: 1.1rem; color: var(--accent); display: flex; justify-content: space-between;}
        #conn-status { font-size: 0.8rem; color: #00ff00; }
        .conn-offline { color: #ff4444 !important; }

        #messages-container { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg-block { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .msg-meta { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; display: flex; align-items: baseline; gap: 8px; }
        .msg-author { color: var(--accent); font-weight: 600; font-size: 0.95rem; }
        .msg-text { color: var(--text-main); line-height: 1.5; font-size: 0.95rem; }
        .chat-image { max-width: 350px; max-height: 350px; border-radius: 8px; border: 1px solid var(--border); margin-top: 8px; display: block; object-fit: contain; background: #000; cursor: zoom-in; }

        #input-wrapper { padding: 20px 30px; display: flex; gap: 10px; }
        #chat-input { flex: 1; padding: 16px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-panel); color: var(--text-main); outline: none; transition: 0.2s; margin: 0; }
        .img-btn { width: 52px; background: var(--bg-panel); border: 1px solid var(--border); color: #fff; border-radius: 8px; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .img-btn:hover { background: var(--bg-hover); border-color: #555; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2>KIRKOWNIA</h2>
        <input type="text" id="username-in" placeholder="Wpisz swój nick" maxlength="15" onkeypress="if(event.key==='Enter') startSession()">
        <button id="login-btn" class="btn" onclick="startSession()">WEJDŹ</button>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-title">Kanały Tekstowe</div>
    <div id="text-nav"></div>
    <div class="sidebar-title">Voice Chat</div>
    <div id="voice-nav">
        <div class="nav-item" onclick="joinVoice('Lobby')"># Lobby</div>
        <div id="users-Lobby" class="vc-user-list"></div>
        <div class="nav-item" onclick="joinVoice('Gaming')"># Gaming</div>
        <div id="users-Gaming" class="vc-user-list"></div>
    </div>
    <div class="user-panel" id="user-ctrl" style="visibility: hidden">
        <span id="my-name" style="font-size: 0.9rem; font-weight: 500;"></span>
        <div class="ctrl-btns">
            <button class="icon-btn" id="m-btn" onclick="toggleMute()" title="Wycisz mikrofon">🎤</button>
            <button class="icon-btn leave-btn" onclick="leaveVoice()" title="Opuść Voice">❌</button>
        </div>
    </div>
</div>

<div id="main-view">
    <div id="chat-header">
        <span># <span id="ch-name">ogolny</span></span>
        <span id="conn-status">🟢 Połączono</span>
    </div>
    <div id="messages-container"></div>
    <div id="input-wrapper">
        <button class="img-btn" onclick="document.getElementById('file-input').click()" title="Wyślij z komputera">📁</button>
        <input type="file" id="file-input" accept="image/png, image/jpeg, image/gif, image/webp" style="display: none;" onchange="uploadImage(event)">
        <input type="text" id="chat-input" placeholder="Napisz wiadomość..." onkeypress="if(event.key==='Enter') sendMsg()">
    </div>
</div>

<script>
    let socket, myUser, myChannel = 'ogolny', myVC = null;
    let localStream, isMuted = false, audioCtx, analyser, dataArray;
    let isConnecting = false;
    let pingInterval;

    let peerConnections = {};
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    function startSession() {
        if(isConnecting) return;
        const name = document.getElementById('username-in').value.trim();
        if(!name) return;

        isConnecting = true;
        document.getElementById('login-btn').innerText = "ŁĄCZENIE...";
        document.getElementById('login-btn').disabled = true;

        myUser = name;
        document.getElementById('my-name').innerText = name;

        connectWebSocket();
    }

    function connectWebSocket() {
        const prot = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        socket = new WebSocket(`${prot}//${window.location.host}/chat`);

        socket.onopen = () => {
            document.getElementById('conn-status').innerText = '🟢 Połączono';
            document.getElementById('conn-status').classList.remove('conn-offline');
            socket.send(JSON.stringify({type:'LOGIN', username:myUser}));

            // SYSTEM BICIA SERCA - Utrzymuje połączenie Rendera przy życiu (co 30 sek)
            if(pingInterval) clearInterval(pingInterval);
            pingInterval = setInterval(() => {
                if(socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({type:'PING'}));
                }
            }, 30000);
        };

        socket.onclose = () => {
            document.getElementById('conn-status').innerText = '🔴 Utracono połączenie. Wznawianie...';
            document.getElementById('conn-status').classList.add('conn-offline');
            if(pingInterval) clearInterval(pingInterval);

            // SYSTEM RECONNECTU - Próbuje wstać po 3 sekundach
            setTimeout(() => {
                connectWebSocket();
            }, 3000);
        };

        socket.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if(d.type === 'LOGIN_OK') {
                document.getElementById('auth-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('auth-overlay').style.display = 'none', 800);
                buildNav(d.channels);
                switchChannel(myChannel); // Wczytuje nasz aktualny kanał
                updateMuteBtnUI();

                // Jeśli byliśmy na VC przed utratą połączenia, powiedzmy o tym serwerowi
                if(myVC) socket.send(JSON.stringify({type:'VC_JOIN', vcName:myVC}));

            } else if(d.type === 'CHAT' && d.channel === myChannel) {
                appendMsg(d);
            } else if(d.type === 'HISTORY') {
                document.getElementById('messages-container').innerHTML = '';
                d.messages.forEach(appendMsg);
            } else if(d.type === 'VC_UPDATE') {
                renderVC(d.data);
                syncMeshConnections(d.data);
            } else if(d.type === 'VC_STATE') {
                updateVisualSpeak(d);
            } else if(d.type === 'SIGNAL') {
                handleSignal(d);
            }
        };
    }

    function buildNav(chs) {
        const nav = document.getElementById('text-nav'); nav.innerHTML = '';
        chs.forEach(c => {
            const el = document.createElement('div');
            el.className = `nav-item ${c === myChannel ? 'active' : ''}`;
            el.innerText = '# ' + c;
            el.onclick = () => switchChannel(c);
            nav.appendChild(el);
        });
    }

    function switchChannel(c) {
        myChannel = c;
        document.getElementById('ch-name').innerText = c;
        document.querySelectorAll('#text-nav .nav-item').forEach(el => {
            el.classList.toggle('active', el.innerText === '# ' + c);
        });
        if(socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({type:'JOIN_CHANNEL', channel:c}));
        }
    }

    function sendMsg() {
        const i = document.getElementById('chat-input');
        if(i.value.trim() !== '' && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({type:'CHAT', content:i.value.trim(), channel:myChannel}));
            i.value = '';
        }
    }

    function uploadImage(event) {
        const file = event.target.files[0];
        if(!file) return;
        if(file.size > 4 * 1024 * 1024) {
            alert("Plik jest za duży! (Maksymalnie 4MB)");
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Image = e.target.result;
            if(socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({type:'CHAT', content: "IMG:" + base64Image, channel:myChannel}));
            }
        };
        reader.readAsDataURL(file);
        event.target.value = '';
    }

    function appendMsg(m) {
        const cont = document.getElementById('messages-container');
        const div = document.createElement('div'); div.className = 'msg-block';

        let displayContent = "";
        if (m.content.startsWith("IMG:data:image")) {
            const b64 = m.content.substring(4);
            displayContent = `<img src="${b64}" class="chat-image" onclick="window.open(this.src)">`;
        } else {
            let safeText = m.content.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const imgRegex = /(https?:\/\/[^\s]+(?:\.jpg|\.jpeg|\.png|\.gif|\.webp)[^\s]*)/ig;
            if(imgRegex.test(safeText)) {
                safeText = safeText.replace(imgRegex, '<img src="$1" class="chat-image">');
            }
            displayContent = safeText;
        }

        div.innerHTML = `<div class="msg-meta"><span class="msg-author">${m.sender}</span> <span>${m.timestamp}</span></div><div class="msg-text">${displayContent}</div>`;
        cont.appendChild(div); cont.scrollTop = cont.scrollHeight;
    }

    // --- SYSTEM VOICE ---

    async function joinVoice(name) {
        if(myVC === name) return;
        if(myVC !== null) leaveVoice(false);

        myVC = name;
        document.getElementById('user-ctrl').style.visibility = 'visible';

        if(!localStream) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({audio:true});
                localStream.getAudioTracks()[0].enabled = !isMuted;
                startVoiceDetection();
            } catch(e) { alert("Musisz zezwolić na użycie mikrofonu!"); myVC = null; return; }
        }

        if(socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({type:'VC_JOIN', vcName:name}));
        }
    }

    function leaveVoice(hidePanel = true) {
        for (let user in peerConnections) {
            peerConnections[user].close();
            let audioEl = document.getElementById('audio-' + user);
            if(audioEl) audioEl.remove();
        }
        peerConnections = {};

        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }

        myVC = null;

        if(hidePanel) {
            document.getElementById('user-ctrl').style.visibility = 'hidden';
        }
        if(socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({type:'VC_LEAVE'}));
        }
    }

    function renderVC(data) {
        document.querySelectorAll('.vc-user-list').forEach(el => el.innerHTML = '');
        for(let vc in data) {
            const cont = document.getElementById('users-' + vc);
            if(cont) {
                for(let sid in data[vc]) {
                    const div = document.createElement('div');
                    div.className = 'vc-user';
                    div.dataset.name = data[vc][sid];
                    div.innerHTML = `<div class="dot"></div> ${data[vc][sid]}`;
                    cont.appendChild(div);
                }
            }
        }
    }

    function toggleMute() {
        isMuted = !isMuted;
        if(localStream) {
            localStream.getAudioTracks()[0].enabled = !isMuted;
        }
        updateMuteBtnUI();
    }

    function updateMuteBtnUI() {
        const btn = document.getElementById('m-btn');
        btn.classList.toggle('active', isMuted);
        btn.innerText = isMuted ? '🔇' : '🎤';
    }

    function startVoiceDetection() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(localStream);
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
            source.connect(analyser); dataArray = new Uint8Array(analyser.frequencyBinCount);
            loop();
        } catch(e) {}
    }

    function loop() {
        if(!localStream) return;
        analyser.getByteFrequencyData(dataArray);
        let vol = dataArray.reduce((a,b) => a+b) / dataArray.length;
        if(socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({type:'VC_STATE', username:myUser, speaking: (vol > 10 && !isMuted)}));
        }
        setTimeout(loop, 200);
    }

    function updateVisualSpeak(d) {
        document.querySelectorAll('.vc-user').forEach(el => {
            if(el.dataset.name === d.username) el.classList.toggle('speaking', d.speaking);
        });
    }

    function syncMeshConnections(allVoiceData) {
        if(!myVC || !allVoiceData[myVC]) return;

        let usersInMyRoom = Object.values(allVoiceData[myVC]);

        for(let user in peerConnections) {
            if(!usersInMyRoom.includes(user)) {
                peerConnections[user].close();
                delete peerConnections[user];
                let a = document.getElementById('audio-' + user);
                if(a) a.remove();
            }
        }

        usersInMyRoom.forEach(user => {
            if(user !== myUser && !peerConnections[user]) {
                createPeer(user);
                if(myUser < user) {
                    let pc = peerConnections[user];
                    pc.createOffer().then(o => {
                        pc.setLocalDescription(o);
                        socket.send(JSON.stringify({type:'SIGNAL', sender:myUser, target:user, offer:o}));
                    });
                }
            }
        });
    }

    function createPeer(targetUser) {
        let pc = new RTCPeerConnection(rtcConfig);
        peerConnections[targetUser] = pc;

        if(localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

        pc.onicecandidate = e => {
            if(e.candidate && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({type:'SIGNAL', sender:myUser, target:targetUser, candidate:e.candidate}));
            }
        };

        pc.ontrack = e => {
            let audioEl = document.getElementById('audio-' + targetUser);
            if(!audioEl) {
                audioEl = document.createElement('audio');
                audioEl.id = 'audio-' + targetUser;
                audioEl.autoplay = true;
                document.body.appendChild(audioEl);
            }
            audioEl.srcObject = e.streams[0];
        };
    }

    async function handleSignal(d) {
        if(d.target !== myUser) return;

        let targetUser = d.sender;
        if(!peerConnections[targetUser]) {
            createPeer(targetUser);
        }

        let pc = peerConnections[targetUser];

        try {
            if (d.offer) {
                await pc.setRemoteDescription(new RTCSessionDescription(d.offer));
                const a = await pc.createAnswer();
                await pc.setLocalDescription(a);
                socket.send(JSON.stringify({type:'SIGNAL', sender:myUser, target:targetUser, answer:a}));
            }
            else if (d.answer) { await pc.setRemoteDescription(new RTCSessionDescription(d.answer)); }
            else if (d.candidate) { await pc.addIceCandidate(new RTCIceCandidate(d.candidate)); }
        } catch(e) { console.log(e); }
    }
</script>
</body>
</html>
