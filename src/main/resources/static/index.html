<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kirkownia PRO</title>
    <style>
        :root { --bg: #36393f; --sidebar: #2f3136; --accent: #5865f2; --text: #dcddde; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; margin: 0; overflow: hidden; }
        #auth-container { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, #40444b 0%, #202225 100%); display: flex; justify-content: center; align-items: center; z-index: 1000; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .auth-box { background: var(--glass); backdrop-filter: blur(15px); padding: 45px; border-radius: 24px; width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        input { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 10px; border: none; background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; transition: 0.3s; }
        input:focus { background: rgba(0,0,0,0.5); box-shadow: 0 0 0 2px var(--accent); outline: none; }
        button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #4752c4; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(88, 101, 242, 0.4); }
        #sidebar { width: 280px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid rgba(0,0,0,0.2); }
        .sidebar-header { padding: 25px; font-weight: 800; font-size: 1.3rem; color: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .channel { padding: 12px 20px; cursor: pointer; border-radius: 10px; margin: 4px 12px; color: #8e9297; transition: 0.2s; font-weight: 500; }
        .channel:hover { background: rgba(255,255,255,0.05); color: white; }
        .channel.active { background: var(--accent); color: white; }
        #chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        #messages { flex: 1; padding: 30px; overflow-y: auto; scroll-behavior: smooth; }
        .message { margin-bottom: 24px; animation: slideIn 0.4s ease-out forwards; opacity: 0; }
        .msg-user { font-weight: 700; color: #fff; margin-right: 12px; font-size: 1.05rem; }
        .msg-time { font-size: 0.75rem; color: #72767d; }
        #input-area { padding: 25px; background: linear-gradient(to top, var(--bg), transparent); }
        #msg-input { width: 100%; padding: 16px; background: #40444b; border-radius: 14px; border: none; color: white; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .vc-status-card { background: rgba(59, 165, 93, 0.1); margin: 15px; padding: 15px; border-radius: 12px; border: 1px solid #3ba55d; text-align: center; }
        .pulse-live { width: 8px; height: 8px; background: #3ba55d; border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 1.5s infinite; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.7; } 70% { transform: scale(1.2); opacity: 0; } 100% { transform: scale(0.95); opacity: 0.7; } }
    </style>
</head>
<body>
<div id="auth-container">
    <div class="auth-box" id="login-box">
        <h1 style="color:white; margin-bottom:10px">KIRKOWNIA</h1>
        <p style="color:#8e9297; margin-bottom:30px">Witaj z powrotem!</p>
        <input type="text" id="login-username" placeholder="Login">
        <input type="password" id="login-password" placeholder="Hasło">
        <button onclick="login()">Zaloguj się</button>
        <p style="margin-top:25px; font-size:0.9rem">Brak konta? <span style="color:var(--accent); cursor:pointer; font-weight:bold" onclick="toggleAuth()">Załóż je tutaj</span></p>
    </div>
    <div class="auth-box" id="register-box" style="display:none">
        <h1 style="color:white; margin-bottom:10px">DOŁĄCZ</h1>
        <p style="color:#8e9297; margin-bottom:30px">Stwórz swój profil</p>
        <input type="email" id="reg-email" placeholder="Twój E-mail">
        <input type="text" id="reg-username" placeholder="Nazwa użytkownika">
        <input type="password" id="reg-password" placeholder="Hasło">
        <button onclick="register()">Zarejestruj się</button>
        <p style="margin-top:25px; font-size:0.9rem">Masz konto? <span style="color:var(--accent); cursor:pointer; font-weight:bold" onclick="toggleAuth()">Wróć do logowania</span></p>
    </div>
    <div class="auth-box" id="verify-box" style="display:none">
        <h1 style="color:white">WERYFIKACJA</h1>
        <p style="margin-bottom:20px">Wpisz kod, który wysłaliśmy na e-mail</p>
        <input type="text" id="verify-code" placeholder="6-cyfrowy kod">
        <button onclick="verify()">Potwierdź kod</button>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-header">KIRKOWNIA <span style="background:var(--accent); padding:6px 12px; border-radius:50%; cursor:pointer; font-size:0.9rem" onclick="createChannel()">+</span></div>
    <div id="channels-list"></div>
    <div id="vc-ui" style="display:none" class="vc-status-card">
        <div style="font-size:0.85rem; font-weight:700; color:#3ba55d"><span class="pulse-live"></span>NA ŻYWO: VOICE</div>
        <button onclick="location.reload()" style="background:#ed4245; margin-top:12px; padding:8px; font-size:0.8rem">Rozłącz się</button>
    </div>
    <button id="vc-start" onclick="toggleVC()" style="margin:15px; background:#3ba55d">Połącz z Voice Chat</button>
</div>

<div id="chat-area">
    <div id="messages"></div>
    <div id="input-area"><input type="text" id="msg-input" placeholder="Napisz coś ciekawego..." onkeypress="if(event.key==='Enter') sendMessage()"></div>
</div>

<script>
    let socket, currentUser, currentChannel = 'ogolny', userToVerify, pc, localStream;
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    function connect() {
        const prot = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        socket = new WebSocket(`${prot}//${window.location.host}/chat`);
        socket.onmessage = async (e) => {
            const d = JSON.parse(e.data);
            if (d.type === 'LOGIN_OK') {
                currentUser = d.username;
                document.getElementById('auth-container').style.opacity = '0';
                setTimeout(() => document.getElementById('auth-container').style.display = 'none', 800);
                updateChannels(d.channels);
                switchChannel('ogolny');
            } else if (d.type === 'NEED_VERIFY') {
                userToVerify = d.username;
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('register-box').style.display = 'none';
                document.getElementById('verify-box').style.display = 'block';
            } else if (d.type === 'REGISTER_OK') { alert("Konto zweryfikowane!"); location.reload(); }
            else if (d.type === 'CHAT' && d.channel === currentChannel) displayMsg(d);
            else if (d.type === 'HISTORY') { document.getElementById('messages').innerHTML = ''; d.messages.forEach(displayMsg); }
            else if (d.type === 'CHANNELS_UPDATE') updateChannels(d.channels);
            else if (d.type === 'SIGNAL' && d.sender !== currentUser) handleSignal(d);
            else if (d.type === 'ERROR') alert(d.message);
        };
        socket.onclose = () => setTimeout(connect, 2000);
    }

    function toggleAuth() {
        const l = document.getElementById('login-box'), r = document.getElementById('register-box');
        l.style.display = l.style.display === 'none' ? 'block' : 'none';
        r.style.display = r.style.display === 'none' ? 'block' : 'none';
    }

    function login() { socket.send(JSON.stringify({type:'LOGIN', username:document.getElementById('login-username').value, password:document.getElementById('login-password').value})); }
    function register() { socket.send(JSON.stringify({type:'REGISTER', email:document.getElementById('reg-email').value, username:document.getElementById('reg-username').value, password:document.getElementById('reg-password').value})); }
    function verify() { socket.send(JSON.stringify({type:'VERIFY', username:userToVerify, code:document.getElementById('verify-code').value})); }

    function updateChannels(chs) {
        const l = document.getElementById('channels-list'); l.innerHTML = '';
        chs.sort().forEach(ch => {
            const div = document.createElement('div');
            div.className = `channel ${ch === currentChannel ? 'active' : ''}`;
            div.innerText = '# ' + ch;
            div.onclick = () => switchChannel(ch);
            l.appendChild(div);
        });
    }

    function switchChannel(ch) {
        currentChannel = ch;
        socket.send(JSON.stringify({type:'JOIN_CHANNEL', channel:ch}));
        document.querySelectorAll('.channel').forEach(el => el.classList.toggle('active', el.innerText.includes(ch)));
    }

    function sendMessage() {
        const i = document.getElementById('msg-input');
        if (i.value.trim() && currentUser) {
            socket.send(JSON.stringify({type:'CHAT', content:i.value, channel:currentChannel}));
            i.value = '';
        }
    }

    function displayMsg(m) {
        const c = document.getElementById('messages'), div = document.createElement('div');
        div.className = 'message';
        const t = new Date(m.timestamp).toLocaleTimeString('pl-PL', {hour:'2-digit', minute:'2-digit'});
        div.innerHTML = `<div><span class="msg-user">${m.sender}</span><span class="msg-time">Dzisiaj o ${t}</span></div><div style="margin-top:6px">${m.content}</div>`;
        c.appendChild(div); c.scrollTop = c.scrollHeight;
    }

    async function toggleVC() {
        const ui = document.getElementById('vc-ui'), btn = document.getElementById('vc-start');
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            ui.style.display = 'block'; btn.style.display = 'none';
            initWebRTC();
        } catch (err) { alert("Brak dostępu do mikrofonu!"); }
    }

    function initWebRTC() {
        pc = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        pc.onicecandidate = e => e.candidate && socket.send(JSON.stringify({type:'SIGNAL', sender:currentUser, candidate:e.candidate}));
        pc.ontrack = e => { const audio = new Audio(); audio.srcObject = e.streams[0]; audio.play(); };
        pc.createOffer().then(o => { pc.setLocalDescription(o); socket.send(JSON.stringify({type:'SIGNAL', sender:currentUser, offer:o})); });
    }

    async function handleSignal(d) {
        if (!pc) initWebRTC();
        if (d.offer) { await pc.setRemoteDescription(new RTCSessionDescription(d.offer)); const a = await pc.createAnswer(); await pc.setLocalDescription(a); socket.send(JSON.stringify({type:'SIGNAL', sender:currentUser, answer:a})); }
        else if (d.answer) { await pc.setRemoteDescription(new RTCSessionDescription(d.answer)); }
        else if (d.candidate) { await pc.addIceCandidate(new RTCIceCandidate(d.candidate)); }
    }

    function createChannel() { const n = prompt("Nazwa kanału:"); if (n) socket.send(JSON.stringify({type:'CREATE_CHANNEL', name:n})); }
    connect();
</script>
</body>
</html>
